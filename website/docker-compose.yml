services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app-network
    environment:
      - BACKEND_URL=http://backend:8000
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    networks:
      - app-network
    depends_on:
      
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=blogdb
      - POSTGRES_USER=website
      - POSTGRES_PASSWORD=blogsAreCool#3
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network


networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
