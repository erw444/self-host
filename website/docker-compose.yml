services:
  frontend:
    build: ./frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend
    networks:
      - app-network
    environment:
      - BACKEND_URL=http://backend:8000

  frontend-admin:
    build: ./frontend-admin
    ports:
      - "8081:8081"
    depends_on:
      - backend
    networks:
      - app-network
    environment:
      - BACKEND_URL=http://backend:8000

  backend:
    build: ./backend
      #context: ./backend
      #dockerfile: Dockerfile.debug
    ports:
      - "8000:8000"
      #- "40000:40000" # Delve debug port
    #command: --security-opt="apparmor=unconfined" --cap-add=SYS_PTRACE 
    networks:
      - app-network
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://website:blogsAreCool%233@db:5432/blogdb?sslmode=disable

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=blogdb
      - POSTGRES_USER=website
      - POSTGRES_PASSWORD=blogsAreCool#3
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network


networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
